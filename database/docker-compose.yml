services:
  postgres-db:
    image: postgres:18
    container_name: dotnet_project
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - ai_legal_pgroot:/var/lib/postgresql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql:ro

volumes:
  ai_legal_pgroot:
    name: ai_legal_pgroot
